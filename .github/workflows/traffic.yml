name: GA4 Auto Traffic Generator 24/7

on:
  schedule:
    # High frequency during VN Lunch Peak 12:00 - 13:30 (UTC 05:00 - 06:30)
    - cron: '15 5 * * *'
    - cron: '45 5 * * *'
    - cron: '15 6 * * *'
    # High frequency during VN Evening Peak 19:00 - 20:00 (UTC 12:00 - 13:00)
    - cron: '0 12 * * *'
    - cron: '30 12 * * *'
    - cron: '0 13 * * *'
    # Regular background traffic every 3 hours
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  simulate-traffic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Traffic Generator on Cloud
        run: |
          python scripts/traffic_generator.py 35
